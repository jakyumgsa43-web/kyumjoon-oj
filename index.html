<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kyumjoon Online Judge</title>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; margin: 0; padding: 0; background-color: #fff; color: #333; }
        
        /* 네비게이션 공통 */
        header { border-bottom: 1px solid #ddd; position: relative; z-index: 1000; background: white; }
        .top-nav { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; }
        .logo { font-size: 28px; font-weight: 300; color: #555; text-decoration: none; letter-spacing: -1px; cursor: pointer; }
        .logo b { color: #0076c0; font-weight: bold; }
        .main-menu { display: flex; list-style: none; gap: 30px; margin: 0; padding: 0; }
        .main-menu li { position: relative; padding-bottom: 10px; cursor: pointer; }
        .main-menu li a { text-decoration: none; color: #444; font-size: 15px; font-weight: 500; }

        /* 드롭다운 메뉴 */
        .dropdown {
            display: none; position: absolute; top: 100%; left: -200px; width: 850px;
            background: white; border: 1px solid #ccc; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            padding: 25px; grid-template-columns: repeat(4, 1fr); gap: 20px;
        }
        .main-menu li:hover .dropdown { display: grid; }
        .dropdown-col h4 { border-bottom: 1px solid #eee; padding-bottom: 5px; color: #888; font-size: 13px; margin: 0 0 10px 0; }
        .dropdown-col ul { list-style: none; padding: 0; margin: 0; }
        .dropdown-col ul li a { color: #555; font-size: 14px; text-decoration: none; display: block; padding: 5px 0; }
        .dropdown-col ul li a:hover { color: #0076c0; text-decoration: underline; }

        /* 섹션 제어 */
        .page-content { display: none; }
        .active { display: block; }

        /* [페이지 1] 메인 홈 스타일 */
        .hero { background: #222 url('https://www.transparenttextures.com/patterns/black-linen.png'); color: white; padding: 60px 0; text-align: center; }
        .stats-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-around; }
        .content-grid { max-width: 1200px; margin: 40px auto; display: grid; grid-template-columns: repeat(4, 1fr); gap: 30px; padding: 0 20px; }
        .grid-section h3 { font-size: 18px; border-bottom: 2px solid #0076c0; padding-bottom: 10px; }

        /* [페이지 2] 문제 목록 스타일 */
        .list-container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .problem-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .problem-table th { border-top: 2px solid #333; border-bottom: 1px solid #ddd; padding: 12px; background: #fcfcfc; text-align: left; }
        .problem-table td { border-bottom: 1px solid #eee; padding: 12px; }
        .tier { display: inline-block; width: 20px; height: 20px; text-align: center; line-height: 20px; font-size: 10px; font-weight: bold; color: white; border-radius: 3px; margin-right: 5px; background: #ad5600; }
    </style>
</head>
<body>

<header>
    <div class="top-nav">
        <a class="logo" onclick="showPage('home')">KYUM<b>J</b>OON<b>></b></a>
        <ul class="main-menu">
            <li>
                <a>문제 ▾</a>
                <div class="dropdown">
                    <div class="dropdown-col">
                        <h4>문제</h4>
                        <ul>
                            <li><a href="javascript:void(0)" onclick="showPage('list')">전체 문제</a></li>
                            <li><a href="#">문제 출처</a></li>
                            <li><a href="#">단계별로 풀어보기</a></li>
                        </ul>
                    </div>
                    </div>
            </li>
            <li><a>문제집</a></li>
            <li><a>채점 현황</a></li>
            <li><a>랭킹</a></li>
        </ul>
    </div>
</header>

<div id="home" class="page-content active">
    <div class="hero">
        <div class="stats-container">
            <div class="stat-item"><h2>28364</h2><p>전체 문제</p></div>
            <div class="stat-item"><h2>23092</h2><p>채점 가능한 문제</p></div>
            <div class="stat-item"><h2>22890</h2><p>풀린 문제</p></div>
        </div>
    </div>
    <div class="content-grid">
        <div class="grid-section"><h3>새로운 글</h3><p>Kyumjoon OJ에 오신 것을 환영합니다!</p></div>
        <div class="grid-section"><h3>인기 문제</h3><p>1위: A+B</p></div>
    </div>
</div>

<div id="list" class="page-content">
    <div class="list-container">
        <h2>문제 목록</h2>
        <table class="problem-table">
            <thead>
                <tr>
                    <th>난이도</th><th>문제 번호</th><th>제목</th><th>제출</th><th>정답률</th>
                </tr>
            </thead>
            <tbody>
                <tr><td><span class="tier">B5</span></td><td>1000</td><td style="color:#0076c0">A+B</td><td>-</td><td>-</td></tr>
                <tr><td><span class="tier">B5</span></td><td>1001</td><td style="color:#0076c0">A-B</td><td>-</td><td>-</td></tr>
                <tr><td><span class="tier">B5</span></td><td>2557</td><td style="color:#0076c0">Hello World</td><td>-</td><td>-</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    function showPage(pageId) {
        // 모든 페이지 컨텐츠를 숨김
        const pages = document.getElementsByClassName('page-content');
        for (let i = 0; i < pages.length; i++) {
            pages[i].classList.remove('active');
        }
        
        // 클릭한 페이지만 보여줌
        document.getElementById(pageId).classList.add('active');
    }
</script>

</body>
</html>
